<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>출장비 계산기</title>
    <!-- Microsoft Teams JS (탭 컨텍스트/테마). Teams 밖에서는 무시됨 -->
    <script src="https://cdn.jsdelivr.net/npm/@microsoft/teams-js@2.54.0/dist/MicrosoftTeams.min.js"></script>
    <!-- Supabase (팀 공유 저장) -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- SheetJS (엑셀 내보내기) -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <!-- React 18 (UMD) + Tailwind Play CDN -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      /* ↓↓↓ 본인 Supabase 프로젝트 값으로 교체하세요 ↓↓↓
         값이 그대로면(YOUR_ 포함) 자동으로 브라우저 저장(localStorage)으로 동작합니다. */
      window.SUPABASE_URL = "https://YOUR_PROJECT.supabase.co";
      window.SUPABASE_ANON_KEY = "YOUR_ANON_KEY";
    </script>
    <style>
      html, body { margin: 0; background: #f1f5f9; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script src="app.js"></script>
  </body>
</html>
